kind = "web"
previewPath = "/"
title = "Health Crew Provider"
version = "1.0.0"
id = "artifacts/health-crew-provider"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19551
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/health-crew-provider run dev"

[services.env]
PORT = "19551"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/health-crew-provider", "run", "build"]
publicDir = "artifacts/health-crew-provider/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
