[build]
  command = "BASE_PATH=/ pnpm --filter @workspace/health-crew-provider run build"
  publish = "artifacts/health-crew-provider/dist/public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
